<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Login Admin</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <!-- El contenedor principal de la tarjeta -->
        <div class="card-container">
            
            <!-- Sección izquierda con la foto y el logo -->
            <div class="card-left">

                <img src="images/imagen-login.PNG" alt="Login Image" class="bg-photo">
                <div class="logo-wrapper">
                    <img src="images/admin.PNG" alt="Admin Logo">
                </div>

            </div>

            <!-- Sección derecha con el formulario -->
            <div class="card-right">

                <form class="login-form">

                    <h2>Login</h2>
                    
                    <div class="input-container">
                        <span class="icon">✉</span>
                        <input type="email" placeholder="email" required>
                    </div>

                    <div class="input-container">
                        <span class="icon">🔒</span>
                        <input type="password" placeholder="contraseña" required>
                    </div>

                    <div class="links">
                        <a href="#" class="forgot-text">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-submit">Ingresar</button>

                </form>

            </div>

        </div>

        <!-- Imagen de fondo decorativa (ondas) -->
        <div class="waves-footer">
            <img src="images/fondo-ondas.PNG" alt="Waves background">
        </div>

    </body>
    
</html>
